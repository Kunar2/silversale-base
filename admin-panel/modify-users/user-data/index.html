<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>Home</title>
    <link href="/public/css/style.css" rel="stylesheet" />
    <script crossorigin="anonymous" src="https://kit.fontawesome.com/16066a3d22.js"></script>

</head>

<body>

    <header>
        <div class="navigation-container">

            <a class="title" href="/home.html">Silversale</a>

            <a href="/catalogue.html" class="nav-item">
                <i class="fa-solid fa-list fa-lg"></i>
                <span>Catalogue</span>
            </a>

            <div class="search">
                <form method="GET" action="/catalogue.html" class="search-form">
                    <input class="search-bar" placeholder="Search.." type="text" name="keywords">
                    <button class="search-button" type="submit">
                    <i class="fa-solid fa-magnifying-glass"></i>
                    </button>
                </form>
            </div>

            <a href="/favourites.html" class="nav-item">
                <i class="fa-solid fa-heart fa-lg"></i>
                <span>Favourites</span>
            </a>

            <a href="/cart.html" class="nav-item">
                <i class="fa-solid fa-bag-shopping fa-lg"></i>
                <span>Cart</span>
            </a>

            <a href="/orders.html" class="nav-item">
                <i class="fa-solid fa-box fa-lg"></i>
                <span>Orders</span>
            </a>

            <a href="/account.html" class="nav-item">
                <i class="fa-solid fa-user fa-lg"></i>
                <span>(username)</span>
            </a>

            <a href="/admin-panel" class="nav-item active">
                <i class="fa-solid fa-gear fa-lg"></i>
                <span>Admin panel</span>
            </a>
        </div>
    </header>


    <div class="item-data-box">

        <div class="item-data-header">
            <h2>User data</h2>
        </div>

        <form class="item-data-form">

            <div class="form-grid">
                <div class="form-group">
                    <label>ID:</label>
                    <input type="text" name="id">
                </div>

                <div class="form-group">
                    <label>Userame:</label>
                    <input type="text" name="username">
                </div>

                <div class="form-group">
                    <label>Email:</label>
                    <input type="text" name="email">
                </div>

                <div class="form-group">
                    <label>Role:</label>
                    <input type="text" name="role">
                </div>
            </div>

            <h2 class="items-title">Items:</h2>

            <table class="admin-panel-table order-items-table">
            <tr>
                <th class="edit-column"></th>
                <th>Item_ID</th>
                <th>Name</th>
                <th>Quantity</th>
                <th>Unit Price</th>
            </tr>

            <tr>
                <td class="edit-column">
                <a href="item-data?id=52">Edit <i class="fa-solid fa-pencil"></i></a>
                </td>
                <td>52</td>
                <td>Hat</td>
                <td>2</td>
                <td>$20</td>
            </tr>

            <tr>
                <td class="edit-column">
                <a href="item-data?id=61">Edit <i class="fa-solid fa-pencil"></i></a>
                </td>
                <td>61</td>
                <td>Jacket</td>
                <td>1</td>
                <td>$10</td>
            </tr>
            </table>


            <div class="item-data-buttons">
                <button type="submit" class="accept-btn">Accept changes</button>
                <button type="submit" class="discard-btn">Discard changes</button>
                <button type="button" class="delete-btn">Delete item</button>
            </div>

        </form>

    </div>

    <footer>
        <div class="footer-container">

            <div class="footer-section">
                <h3>Contact us</h3>
                <p>+1 234-567-8901 (General Questions)</p>
                <p>+1 234-567-8901 (Customer Support)</p>
                <p>ViveLeau@gmail.com</p>
            </div>
            <div class="footer-section">
                <h3>Stay connected</h3>
                <div class="social-icons">
                    <a href="#"><i class="fa fa-facebook"></i></a>
                    <a href="#"><i class="fa fa-youtube"></i></a>
                    <a href="#"><i class="fa fa-instagram"></i></a>
                    <a href="#"><i class="fa fa-twitter"></i></a>
                </div>
                <a href="#">About us</a>
            </div>
        </div>
    </footer>

</body>

</html>
