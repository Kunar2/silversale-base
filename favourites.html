<!DOCTYPE html>
<html lang="en">

<head>

    <title>Favourites</title>
    <link href="public/css/style.css" rel="stylesheet" />
    <script src="test.js"></script>

    <style>
        a {
            color: black;
            text-decoration: none;
        }

        img {
            width: 370px;
            height: 350px;
        }
    </style>
</head>

<body>


    <header>
        <div class="navigation-container">

            <a class="title" href="home.html">Silversale</a>

            <a href="catalogue.html" class="nav-item">
                <i class="fa-solid fa-list fa-lg"></i>
                <span>Catalogue</span>
            </a>

            <div class="search">
                <form method="GET" action="catalogue.html" class="search-form">
                    <input class="search-bar" placeholder="Search.." type="text" name="keywords">

                    <i class="fa-solid fa-magnifying-glass"></i>
                    </button>
                </form>
            </div>

            <a href="favourites.html" class="nav-item active">

            </a>

            <a href="orders.html" class="nav-item">
                <i class="fa-solid fa-box fa-lg"></i>

            </a>

            <a href="account.html" class="nav-item">
                <i class="fa-solid fa-user fa-lg"></i>

    <div class="item-list">

        <a class="grid-item" href="item.html">

            <i class="fa-solid fa-star fa-xs"></i>
            <i class="fa-regular fa-star fa-xs"></i>
            <span> (234) </span></p>
            <div class="item-btn-section">
                <form method="POST" action="/programme/${programme.id}/unwatch">
                    <button class="item-btn picked">Unwatch</button>
                </form>
            </div>
        </a>

        <a class="grid-item" href="item.html">
            <img alt="item" src="public/item_1.png">
            <p class="spacingText">Baseball Cap</p>
            <p class="spacingText">$26</p>
            <p class="spacingText">
            <i class="fa-solid fa-star fa-xs"></i>
            <i class="fa-solid fa-star fa-xs"></i>

            <div class="footer-section">

                <div class="social-icons">
                    <a href="#"><i class="fa fa-facebook"></i></a>
