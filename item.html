<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>Item</title>
    <link href="public/css/style.css" rel="stylesheet" />
    <script crossorigin="anonymous" src="https://kit.fontawesome.com/16066a3d22.js"></script>
    <script src="checkout.js"></script>
</head>

<body>

    <header>
        <div class="navigation-container">

            <a class="title" href="home.html">Silversale</a>

            <a href="catalogue.html" class="nav-item active">
                <i class="fa-solid fa-list fa-lg"></i>
                <span>Catalogue</span>
            </a>

            <div class="search">
                <form method="GET" action="catalogue.html" class="search-form">
                    <input class="search-bar" placeholder="Search.." type="text" name="keywords">
                    <button class="search-button" type="submit">
                    <i class="fa-solid fa-magnifying-glass"></i>
                    </button>
                </form>
            </div>

            <a href="favourites.html" class="nav-item">
                <i class="fa-solid fa-heart fa-lg"></i>
                <span>Favourites</span>
            </a>

            <a href="cart.html" class="nav-item">
                <i class="fa-solid fa-bag-shopping fa-lg"></i>
                <span>Cart</span>
            </a>

            <a href="orders.html" class="nav-item">
                <i class="fa-solid fa-box fa-lg"></i>
                <span>Orders</span>
            </a>

            <a href="account.html" class="nav-item">
                <i class="fa-solid fa-user fa-lg"></i>
                <span>(username)</span>
            </a>
        </div>
    </header>

    <div class="item-container">

        <img alt="item" class="image-position" src="public/item_1.png">

        <div class="item-header">
            <div class="item-category">Hats</div>
            <div class="description-top">Baseball Cap</div>
            <div class="item-manufacturer">Mikes Corp.</div>
            <div class="review-data">
                <i class="fa-solid fa-star fa-xs"></i>
                <i class="fa-solid fa-star fa-xs"></i>
                <i class="fa-solid fa-star fa-xs"></i>
                <i class="fa-solid fa-star fa-xs"></i>
                <i class="fa-regular fa-star fa-xs"></i>
                <span class="description-main">265</span>
            </div>

            <div class="item-description">Cap for sunny weathers.</div> 

            <div class="description-top">Size: </div>
            <div class="description-main">
                <button class="size-btn unpicked">S</button>
                <button class="size-btn picked">M</button>
                <button class="size-btn unpicked">L</button>
            </div>

            <div class="description-top">$25</div>

            <div class="description-top">Available: 240</div>

            <div>
                <form action="" method="GET">
                    <input type="hidden" name="action" value="add_cart">
                    <button class="cart-btn">Add to cart</button>
                </form>
            </div>

            <div>
                <form action="" method="GET">
                    <input type="hidden" name="action" value="add_favourite">
                    <button class="cart-btn">Favourite</button>
                </form>
            </div>
        </div>

    </div>

    <footer>
        <div class="footer-container">

            <div class="footer-section">
                <h3>Contact us</h3>
                <p>+1 234-567-8901 (General Questions)</p>
                <p>+1 234-567-8901 (Customer Support)</p>
                <p>ViveLeau@gmail.com</p>
            </div>
            <div class="footer-section">
                <h3>Stay connected</h3>
                <div class="social-icons">
                    <a href="#"><i class="fa fa-facebook"></i></a>
                    <a href="#"><i class="fa fa-youtube"></i></a>
                    <a href="#"><i class="fa fa-instagram"></i></a>
                    <a href="#"><i class="fa fa-twitter"></i></a>
                </div>
                <a href="#">About us</a>
            </div>
        </div>
    </footer>

</body>

</html>
