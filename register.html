<body>
    <header>
        <div class="navigation-container">

            <a class="title" href="home.html">Silversale</a>

            <a href="/catalogue.html" class="nav-item">
                <i class="fa-solid fa-list fa-lg"></i>
                <span>Catalogue</span>
            </a>

            <div class="search">
                <form method="GET" action="/catalogue.html" class="search-form">
                    <input class="search-bar" placeholder="Search.." type="text" name="keywords">
                    <button class="search-button" type="submit">
                    <i class="fa-solid fa-magnifying-glass"></i>
                    </button>
                </form>
            </div>

            <a href="/favourites.html" class="nav-item">
                <i class="fa-solid fa-heart fa-lg"></i>

            <a href="/cart.html" class="nav-item">
                <i class="fa-solid fa-bag-shopping fa-lg"></i>

            <a href="/orders.html" class="nav-item">

            <a href="/signin.html" class="nav-item active">
                <i class="fa-solid fa-right-to-bracket fa-lg"></i>

            </a>

        </div>
    </header>

    <div class="middle-text-register">

        <form action="/website1/scripts/php/account-management.php" method="POST" class="input-form">

            <input type="hidden" name="action" value="register">

            <div>
                <div class="data-type"><label for="email-input" class="data-type">Username</label></div>
                <input type="text" id="usernameInput" name="username" class="input-field" placeholder="Username">
            </div>

            <div>
                <div class="data-type"><label for="email-input" class="data-type">Password</label></div>
                <input type="password" id="password-input" name="password" class="input-field" placeholder="Password">
                <button type="button" id="swap" class="inside" onclick="textVisibility()">Show</button>
            </div>

            <div>
                <div class="data-type"><label for="email-input" class="data-type">Email</label></div>
                <input type="text" id="email-input" name="email" class="input-field" placeholder="Email">
            </div>

            <div class="submit-section">
                <button type="submit" class="submit" value="Submit">Submit</button>
            </div>

        </form>

        <div><a href="signin.html">Already have an account?</a></div>

    </div>

    <footer>
        <div class="footer-container">

            <div class="footer-section">

                <p>+1 234-567-8901 (General Questions)</p>
                <p>+1 234-567-8901 (Customer Support)</p>
                <p>ViveLeau@gmail.com</p>

            <div class="footer-section">

            </div>
