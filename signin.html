<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>Home</title>
    <link href="/public/css/style.css" rel="stylesheet" />
    <script crossorigin="anonymous" src="https://kit.fontawesome.com/16066a3d22.js"></script>
    <script src="http://127.0.0.1:5500//scripts/js/visibility.js"></script>
</head>

<body>
    <header>
        <div class="navigation-container">

            <a class="title" href="/home.html">Silversale</a>

            <a href="/catalogue.html" class="nav-item">
                <i class="fa-solid fa-list fa-lg"></i>
                <span>Catalogue</span>
            </a>

            <div class="search">
                <form method="GET" action="/catalogue.html" class="search-form">
                    <input class="search-bar" placeholder="Search.." type="text" name="keywords">
                    <button class="search-button" type="submit">
                    <i class="fa-solid fa-magnifying-glass"></i>
                    </button>
                </form>
            </div>

            <a href="/favourites.html" class="nav-item">
                <i class="fa-solid fa-heart fa-lg"></i>
                <span>Favourites</span>
            </a>

            <a href="/cart.html" class="nav-item">
                <i class="fa-solid fa-bag-shopping fa-lg"></i>
                <span>Cart</span>
            </a>

            <a href="/orders.html" class="nav-item">
                <i class="fa-solid fa-box fa-lg"></i>
                <span>Orders</span>
            </a>

            <a href="/signin.html" class="nav-item active">
                <i class="fa-solid fa-right-to-bracket fa-lg"></i>
                <span>Sign in</span>
            </a>
        </div>
    </header>

    <div class="signin-box">
        <div class=signin-main>
            <span>Sign in</span>
            <form action="" method="POST">
                <div>
                    <input type="hidden" name="action" value="signin">
                    <span><input type="text" class="inputField" placeholder="Username" name="username"> </span>
                </div>
                <div>
                    <input type="password" class="inputField" id="password-input" placeholder="Password" name="password">
                    <button type="button" class="inside" id="swap" onclick="textVisibility()">Show</button>
                </div>
                <div>
                    <button type="submit" class="submit" value="Submit">Submit</button>
                </div>
            </form>
        </div>

        <div class="register-main">
            <span class="noaccount">No account?</span>
            <div>
                <a href="register.html">
                <button type="submit" class="submit" value="Submit">Create account</button>
                </a>
            </div>
        </div>
    </div>

    <footer>
        <div class="footer-container">

            <div class="footer-section">
                <h3>Contact us</h3>
                <p>+1 234-567-8901 (General Questions)</p>
                <p>+1 234-567-8901 (Customer Support)</p>
                <p>ViveLeau@gmail.com</p>
            </div>
            <div class="footer-section">
                <h3>Stay connected</h3>
                <div class="social-icons">
                    <a href="#"><i class="fa fa-facebook"></i></a>
                    <a href="#"><i class="fa fa-youtube"></i></a>
                    <a href="#"><i class="fa fa-instagram"></i></a>
                    <a href="#"><i class="fa fa-twitter"></i></a>
                </div>
                <a href="#">About us</a>
            </div>
        </div>
    </footer>

</body>

</html>
